name: Export Source

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-Source-Tree
          path: |
            **
            !bin/**
            !obj/**
            !publish/**
          include-hidden-files: true
          if-no-files-found: error

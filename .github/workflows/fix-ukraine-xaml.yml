name: Fix Ukraine Exact XAML Structure

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  fix-xaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ukraine-reference-theme-v2
          fetch-depth: 0

      - name: Move Grid column definitions before visual children
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('MainWindow.xaml')
          s = p.read_text(encoding='utf-8')
          block = '''                    <Grid.ColumnDefinitions>\n                        <ColumnDefinition Width="*"/>\n                        <ColumnDefinition Width="Auto"/>\n                        <ColumnDefinition Width="Auto"/>\n                    </Grid.ColumnDefinitions>\n\n'''
          marker = '                <Grid Grid.Row="0" MouseLeftButtonDown="TitleBar_MouseLeftButtonDown" ClipToBounds="False">\n'
          if marker not in s:
              raise RuntimeError('Header grid marker not found')
          if block not in s:
              raise RuntimeError('Column definition block not found')
          s = s.replace(block, '', 1)
          s = s.replace(marker, marker + block, 1)
          p.write_text(s, encoding='utf-8')
          PY
          rm -f .github/workflows/fix-ukraine-xaml.yml

      - name: Commit XAML fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Ukraine Exact header XAML structure"
          git push origin HEAD:feature/ukraine-reference-theme-v2

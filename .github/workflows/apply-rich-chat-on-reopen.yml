name: Apply Rich Chat On Reopen

on:
  pull_request:
    types: [reopened]
    branches: [ feature/ukraine-reference-theme-v2 ]

permissions:
  contents: write

jobs:
  patch-and-build:
    if: github.event.pull_request.head.ref == 'feature/stalker-theme-and-chat-fixes'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/stalker-theme-and-chat-fixes
          fetch-depth: 0

      - name: Apply exact rich-chat patches
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path('Services/TwitchService.cs')
          text = path.read_text(encoding='utf-8')
          old = '        return new ChatMessage { Platform = "TWITCH", User = user, Text = text, Role = role, ExternalId = tags.TryGetValue("id", out var id) ? id : string.Empty, AuthorId = tags.TryGetValue("user-id", out var userId) ? userId : string.Empty, Time = DateTime.Now };'
          new = '''        return new ChatMessage
          {
              Platform = "TWITCH",
              User = user,
              Text = text,
              Role = role,
              ExternalId = tags.TryGetValue("id", out var id) ? id : string.Empty,
              AuthorId = tags.TryGetValue("user-id", out var userId) ? userId : string.Empty,
              Time = DateTime.Now,
              Emotes = ParseTwitchEmotes(tags, text)
          };'''
          if old not in text:
              raise RuntimeError('Twitch message marker not found')
          text = text.replace(old, new, 1)
          marker = '    private static DonationEvent? ParseDonation(string line)'
          helper = '''    private static List<ChatEmote> ParseTwitchEmotes(IReadOnlyDictionary<string, string> tags, string messageText)
          {
              var result = new List<ChatEmote>();
              if (!tags.TryGetValue("emotes", out var tag) || string.IsNullOrWhiteSpace(tag)) return result;
              foreach (var group in tag.Split('/', StringSplitOptions.RemoveEmptyEntries))
              {
                  var separator = group.IndexOf(':');
                  if (separator <= 0 || separator >= group.Length - 1) continue;
                  var id = group[..separator];
                  foreach (var range in group[(separator + 1)..].Split(',', StringSplitOptions.RemoveEmptyEntries))
                  {
                      var limits = range.Split('-', 2);
                      if (limits.Length != 2 || !int.TryParse(limits[0], out var start) || !int.TryParse(limits[1], out var end)) continue;
                      if (start < 0 || end < start || end >= messageText.Length) continue;
                      result.Add(new ChatEmote
                      {
                          Platform = "TWITCH",
                          Id = id,
                          Name = messageText[start..(end + 1)],
                          Start = start,
                          End = end,
                          ImageUrl = $"https://static-cdn.jtvnw.net/emoticons/v2/{Uri.EscapeDataString(id)}/default/dark/2.0"
                      });
                  }
              }
              return result.OrderBy(x => x.Start).ThenByDescending(x => x.Length).ToList();
          }

'''
          if marker not in text:
              raise RuntimeError('Twitch donation marker not found')
          text = text.replace(marker, helper + marker, 1)
          path.write_text(text, encoding='utf-8', newline='\n')

          path = Path('MainWindow.xaml')
          text = path.read_text(encoding='utf-8')
          ns = '        xmlns:controls="clr-namespace:TiHiY.StreamControlCenter.Controls"\n'
          if ns not in text:
              text = text.replace('        xmlns:models="clr-namespace:TiHiY.StreamControlCenter.Models"\n', '        xmlns:models="clr-namespace:TiHiY.StreamControlCenter.Models"\n' + ns, 1)
          old = '<TextBlock Grid.Column="3" Text="{Binding Text}" TextWrapping="Wrap" Foreground="#DCE9F3"/>'
          new = '<controls:RichChatTextBlock Grid.Column="3" Message="{Binding}" MessageBrush="#DCE9F3" HighlightBrush="#FFD329" EmoteSize="21"/>'
          if old not in text:
              raise RuntimeError('Main chat text marker not found')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8', newline='\n')
          '@ | Set-Content apply_patch.py -Encoding utf8
          python apply_patch.py
          Remove-Item apply_patch.py

      - name: Build
        shell: pwsh
        run: dotnet build TiHiY.StreamControlCenter.csproj -c Release

      - name: Commit patch and remove workflow
        shell: pwsh
        run: |
          Remove-Item .github/workflows/apply-rich-chat-on-reopen.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Render Twitch emotes in multichat and overlays"
          git push origin HEAD:feature/stalker-theme-and-chat-fixes

name: Windows Build

on:
  push:
    branches: [ main, "agent/**", "feature/**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify WPF source tree
        shell: pwsh
        run: |
          $requiredFiles = @(
            "TiHiY.StreamControlCenter.sln",
            "TiHiY.StreamControlCenter.csproj",
            "App.xaml",
            "App.xaml.cs",
            "MainWindow.xaml",
            "GlobalUsings.cs",
            "Themes/CyberAmber.xaml",
            "Themes/Compatibility.xaml",
            "Themes/UkraineReference.xaml",
            "Localization/Strings.uk-UA.xaml",
            "Localization/Strings.en-US.xaml",
            "Build/Generate-AppIcon.ps1",
            "Services/AppServices.cs",
            "Services/ObsWebSocketService.cs",
            "Services/YouTubeService.cs",
            "Services/ResponsiveBlockService.cs",
            "Services/ThemeService.cs",
            "Services/ThemePreviewRenderer.cs",
            "Services/LanguageService.cs",
            "Services/UiTextLocalizer.cs",
            "Services/ButtonIconService.cs",
            "Services/MainWindowVisualTuner.cs",
            "Services/ChatAppearanceRuntime.cs",
            "Services/SettingsExtensionsRuntime.cs",
            "Services/ShortcutService.cs",
            "Models/DonationEvent.cs",
            "Windows/JournalWindow.xaml",
            "Windows/JournalWindow.xaml.cs",
            "Windows/SettingsWindow.xaml",
            "Windows/SettingsWindow.xaml.cs",
            "Windows/ChatAppearanceSettingsWindow.xaml",
            "Windows/ChatAppearanceSettingsWindow.xaml.cs"
          )
          foreach ($requiredFile in $requiredFiles) {
            if (-not (Test-Path $requiredFile)) {
              throw "Required WPF source file is missing: $requiredFile"
            }
          }
          Write-Host "Complete WPF source tree verified."

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore TiHiY.StreamControlCenter.sln

      - name: Build
        shell: pwsh
        run: |
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore *> build.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $errors = Get-Content build.log | Where-Object { $_ -match ': error ' -or $_ -match 'error (CS|MC|XDG|MSB|NETSDK|BG)[0-9]+' }
            if (-not $errors) { $errors = Get-Content build.log | Select-Object -Last 160 }
            $errors | Set-Content -Path build-errors.txt -Encoding utf8
            Write-Host "==== BUILD ERRORS ===="
            Get-Content build-errors.txt | ForEach-Object { Write-Host $_ }
            Write-Host "==== END BUILD ERRORS ===="
            exit $exitCode
          }
          "Build completed successfully." | Set-Content -Path build-errors.txt -Encoding utf8
          Write-Host "Build completed successfully."

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            build.log
            build-errors.txt
          if-no-files-found: warn

      - name: Publish self-contained Windows build
        run: dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish

      - name: Upload program
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-StreamControl-Center-win-x64
          path: publish/**

      - name: Verify branded executable icon
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path preview | Out-Null
          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          if (-not (Test-Path "Assets/AppIcon.ico")) { throw "Generated Assets/AppIcon.ico is missing." }
          if (-not (Test-Path "Assets/AppIcon.png")) { throw "Generated Assets/AppIcon.png is missing." }

          Add-Type -AssemblyName System.Drawing
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon($exe)
          if ($null -eq $icon) { throw "The published EXE has no extractable application icon." }
          try {
            $bitmap = $icon.ToBitmap()
            try {
              $bitmap.Save((Join-Path $PWD "preview/TiHiY-Executable-Icon.png"), [System.Drawing.Imaging.ImageFormat]::Png)
            }
            finally { $bitmap.Dispose() }
          }
          finally { $icon.Dispose() }
          Write-Host "Branded application icon verified in published EXE."

      - name: Smoke test real windows, theme, languages and shortcut
        shell: pwsh
        run: |
          $diagnosticLog = Join-Path $PWD "preview/smoke-test.log"
          "Ukraine reference theme smoke tests started at $(Get-Date -Format o)" | Set-Content $diagnosticLog -Encoding utf8
          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          $workingDirectory = Split-Path $exe

          function Invoke-AppCapture {
            param(
              [Parameter(Mandatory = $true)][string]$Name,
              [Parameter(Mandatory = $true)][string]$Shot,
              [Parameter(Mandatory = $true)][string[]]$Arguments
            )

            $process = $null
            try {
              $startInfo = [Diagnostics.ProcessStartInfo]::new()
              $startInfo.FileName = $exe
              $startInfo.WorkingDirectory = $workingDirectory
              $startInfo.UseShellExecute = $false
              $startInfo.CreateNoWindow = $true
              $startInfo.RedirectStandardOutput = $true
              $startInfo.RedirectStandardError = $true
              foreach ($argument in $Arguments) { $startInfo.ArgumentList.Add($argument) }

              $process = [Diagnostics.Process]::new()
              $process.StartInfo = $startInfo
              if (-not $process.Start()) { throw "${Name}: Process.Start returned false." }
              "$Name started with PID $($process.Id)." | Add-Content $diagnosticLog

              $stdoutTask = $process.StandardOutput.ReadToEndAsync()
              $stderrTask = $process.StandardError.ReadToEndAsync()

              if (-not $process.WaitForExit(60000)) {
                $process.Kill($true)
                $process.WaitForExit()
                throw "$Name timed out."
              }

              $stdout = $stdoutTask.GetAwaiter().GetResult()
              $stderr = $stderrTask.GetAwaiter().GetResult()
              if ($stdout) { "---- $Name STDOUT ----`n$stdout" | Add-Content $diagnosticLog }
              if ($stderr) { "---- $Name STDERR ----`n$stderr" | Add-Content $diagnosticLog }
              "$Name exit code: $($process.ExitCode)" | Add-Content $diagnosticLog

              if ($process.ExitCode -ne 0) { throw "$Name exited with code $($process.ExitCode)." }
              if (-not (Test-Path $Shot)) { throw "$Name did not create screenshot: $Shot" }
              if ((Get-Item $Shot).Length -lt 25000) { throw "$Name screenshot is unexpectedly small." }
            }
            finally {
              if ($process) { $process.Dispose() }
              Start-Sleep -Milliseconds 700
            }
          }

          $mainShot = Join-Path $PWD "preview/TiHiY-StreamControl-Center-Ukraine-Reference.png"
          $settingsUaShot = Join-Path $PWD "preview/TiHiY-Settings-Ukraine-Theme-Preview-UA.png"
          $settingsEnShot = Join-Path $PWD "preview/TiHiY-Settings-Ukraine-Theme-Preview-EN.png"
          $settingsTwitchShot = Join-Path $PWD "preview/TiHiY-Settings-Twitch-Studio.png"
          $settingsBotShot = Join-Path $PWD "preview/TiHiY-Settings-Chat-Bot.png"
          $settingsDonationsShot = Join-Path $PWD "preview/TiHiY-Settings-Donation-Widgets.png"
          $shortcut = Join-Path $PWD "preview/TiHiY StreamControl Center.lnk"

          Invoke-AppCapture -Name "MainWindow-UA" -Shot $mainShot -Arguments @(
            "--ci-screenshot=$mainShot",
            "--ci-apply-ukraine-theme",
            "--ci-shortcut=$shortcut"
          )
          if (-not (Test-Path $shortcut)) { throw "The application did not create the requested .lnk shortcut." }
          if ((Get-Item $shortcut).Length -lt 100) { throw "The generated .lnk shortcut is unexpectedly small." }

          Invoke-AppCapture -Name "Settings-UA" -Shot $settingsUaShot -Arguments @(
            "--ci-screenshot=$settingsUaShot",
            "--ci-apply-ukraine-theme",
            "--ci-open-settings",
            "--ci-settings-theme-preview",
            "--ci-language=uk-UA"
          )

          Invoke-AppCapture -Name "Settings-EN" -Shot $settingsEnShot -Arguments @(
            "--ci-screenshot=$settingsEnShot",
            "--ci-apply-ukraine-theme",
            "--ci-open-settings",
            "--ci-settings-theme-preview",
            "--ci-language=en-US"
          )

          Invoke-AppCapture -Name "Settings-Twitch" -Shot $settingsTwitchShot -Arguments @(
            "--ci-screenshot=$settingsTwitchShot",
            "--ci-apply-ukraine-theme",
            "--ci-open-settings",
            "--ci-settings-section=Twitch",
            "--ci-language=uk-UA"
          )

          Invoke-AppCapture -Name "Settings-ChatBot" -Shot $settingsBotShot -Arguments @(
            "--ci-screenshot=$settingsBotShot",
            "--ci-apply-ukraine-theme",
            "--ci-open-settings",
            "--ci-settings-section=Чат-бот",
            "--ci-language=uk-UA"
          )

          Invoke-AppCapture -Name "Settings-Donations" -Shot $settingsDonationsShot -Arguments @(
            "--ci-screenshot=$settingsDonationsShot",
            "--ci-apply-ukraine-theme",
            "--ci-open-settings",
            "--ci-settings-section=Донати",
            "--ci-language=uk-UA"
          )

          $appLogFolder = Join-Path $env:APPDATA "TiHiY/StreamControlCenter/Logs"
          if (Test-Path $appLogFolder) {
            Get-ChildItem $appLogFolder -File -ErrorAction SilentlyContinue | Copy-Item -Destination preview -Force
          }

          Write-Host "Main window, themed settings window, Twitch Studio, chat bot, donation widgets, UA/EN localization, EXE icon and shortcut verified."

      - name: Upload verified screenshots, icon, shortcut and startup logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-Ukraine-Reference-Theme-Verification
          path: preview/**
          if-no-files-found: warn

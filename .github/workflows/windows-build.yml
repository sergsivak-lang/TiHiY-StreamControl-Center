name: Windows Build

on:
  push:
    branches: [ main, "agent/**", "feature/**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore complete WPF source
        shell: pwsh
        run: |
          if (-not (Test-Path "Services/AppServices.cs")) {
            git checkout origin/agent/cyber-amber-full-ui-v3 -- Models Services Windows
          }

          # Restore the monitoring files from the current Ukraine-theme branch after
          # the legacy source snapshot has supplied the rest of Models/Services/Windows.
          git checkout HEAD -- Models/SystemMonitorSnapshot.cs Services/SystemMonitorService.cs Services/AppServices.SystemMonitor.cs

          $appServicesPath = "Services/AppServices.cs"
          $appServices = Get-Content $appServicesPath -Raw
          if ($appServices -notmatch 'public sealed partial class AppServices') {
            $appServices = $appServices.Replace('public sealed class AppServices', 'public sealed partial class AppServices')
            Set-Content -Path $appServicesPath -Value $appServices -Encoding utf8
          }

          if (-not (Test-Path "Services/AppServices.cs")) { throw "Services/AppServices.cs is missing after restore." }
          if (-not (Test-Path "Services/SystemMonitorService.cs")) { throw "Services/SystemMonitorService.cs is missing after restore." }
          if (-not (Test-Path "Windows/SettingsWindow.xaml")) { throw "Windows/SettingsWindow.xaml is missing after restore." }
          Write-Host "WPF source restored successfully."

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore TiHiY.StreamControlCenter.sln

      - name: Build
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore *> build.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $errors = Get-Content build.log | Where-Object { $_ -match ': error ' -or $_ -match 'error (CS|MC|XDG|MSB)[0-9]+' }
            if (-not $errors) { $errors = Get-Content build.log | Select-Object -Last 80 }
            $body = "### Windows Build failed`n```text`n" + (($errors | Select-Object -First 80) -join "`n") + "`n```"
            Write-Host $body
            gh pr comment 1 --body $body
            exit $exitCode
          }
          Write-Host "Build completed successfully."

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log

      - name: Publish portable Windows build
        run: dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained false --output publish

      - name: Capture real application screenshot
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path preview | Out-Null
          $exe = Resolve-Path "publish/TiHiY.StreamControlCenter.exe"
          $shot = Join-Path $PWD "preview/TiHiY-Ukraine-Theme.png"
          $process = Start-Process -FilePath $exe -ArgumentList "--ci-screenshot=`"$shot`"" -PassThru
          if (-not $process.WaitForExit(45000)) {
            Stop-Process -Id $process.Id -Force
            throw "Screenshot process timed out."
          }
          if ($process.ExitCode -ne 0) { throw "Application exited with code $($process.ExitCode) while creating screenshot." }
          if (-not (Test-Path $shot)) { throw "Application did not create the screenshot." }

      - name: Upload real screenshot
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-Ukraine-Theme-Screenshot
          path: preview/TiHiY-Ukraine-Theme.png

      - name: Upload program
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-StreamControl-Center-win-x64
          path: publish/**

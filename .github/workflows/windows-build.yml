name: Windows Build

on:
  push:
    branches: [ main, "agent/**", "feature/**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout branch head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Verify WPF source tree
        shell: pwsh
        run: |
          $requiredFiles = @(
            "TiHiY.StreamControlCenter.sln",
            "TiHiY.StreamControlCenter.csproj",
            "App.xaml",
            "MainWindow.xaml",
            "GlobalUsings.cs",
            "Themes/CyberAmber.xaml",
            "Services/AppServices.cs",
            "Services/ObsWebSocketService.cs",
            "Services/YouTubeService.cs",
            "Services/ResponsiveBlockService.cs",
            "Services/ThemeService.cs",
            "Models/DonationEvent.cs",
            "Windows/JournalWindow.xaml",
            "Windows/JournalWindow.xaml.cs"
          )
          foreach ($requiredFile in $requiredFiles) {
            if (-not (Test-Path $requiredFile)) {
              throw "Required WPF source file is missing: $requiredFile"
            }
          }
          Write-Host "Complete WPF source tree verified."

      - name: Harden optional theme image loading
        shell: python {0}
        run: |
          from pathlib import Path

          path = Path("Services/ThemeService.cs")
          text = path.read_text(encoding="utf-8")

          old_image = '''    private static void SetImageResource(ResourceDictionary resources, string key, string? fileName)
              {
                  var dictionary = FindDictionary(resources, key);
                  if (string.IsNullOrWhiteSpace(fileName))
                  {
                      var transparent = new BitmapImage();
                      transparent.BeginInit();
                      transparent.UriSource = new Uri("pack://application:,,,/TiHiY.StreamControlCenter;component/Assets/Themes/transparent.png", UriKind.Absolute);
                      transparent.CacheOption = BitmapCacheOption.OnLoad;
                      transparent.EndInit();
                      transparent.Freeze();
                      dictionary[key] = transparent;
                      return;
                  }

                  var image = new BitmapImage();
                  image.BeginInit();
                  image.UriSource = new Uri($"pack://application:,,,/TiHiY.StreamControlCenter;component/Assets/Themes/{fileName}", UriKind.Absolute);
                  image.CacheOption = BitmapCacheOption.OnLoad;
                  image.EndInit();
                  image.Freeze();
                  dictionary[key] = image;
              }
          '''

          new_image = '''    private static ImageSource CreateTransparentImage()
              {
                  var image = new DrawingImage(
                      new GeometryDrawing(
                          Brushes.Transparent,
                          null,
                          new RectangleGeometry(new Rect(0, 0, 1, 1))));
                  image.Freeze();
                  return image;
              }

              private static BitmapImage LoadThemeImage(string fileName)
              {
                  var image = new BitmapImage();
                  image.BeginInit();
                  image.UriSource = new Uri($"pack://application:,,,/TiHiY.StreamControlCenter;component/Assets/Themes/{fileName}", UriKind.Absolute);
                  image.CacheOption = BitmapCacheOption.OnLoad;
                  image.EndInit();
                  image.Freeze();
                  return image;
              }

              private static void SetImageResource(ResourceDictionary resources, string key, string? fileName)
              {
                  var dictionary = FindDictionary(resources, key);
                  if (string.IsNullOrWhiteSpace(fileName))
                  {
                      dictionary[key] = CreateTransparentImage();
                      return;
                  }

                  try
                  {
                      dictionary[key] = LoadThemeImage(fileName);
                  }
                  catch (Exception ex)
                  {
                      System.Diagnostics.Debug.WriteLine($"Optional theme image '{fileName}' was not loaded: {ex.Message}");
                      dictionary[key] = CreateTransparentImage();
                  }
              }
          '''

          old_texture = '''    private static void SetTextureBrush(ResourceDictionary resources, string key, string fileName, double opacity, bool tile, Color fallback)
              {
                  var dictionary = FindDictionary(resources, key);
                  var image = new BitmapImage();
                  image.BeginInit();
                  image.UriSource = new Uri($"pack://application:,,,/TiHiY.StreamControlCenter;component/Assets/Themes/{fileName}", UriKind.Absolute);
                  image.CacheOption = BitmapCacheOption.OnLoad;
                  image.EndInit();
                  image.Freeze();

                  var textureBrush = new ImageBrush
                  {
                      ImageSource = image,
                      Stretch = tile ? Stretch.Fill : Stretch.UniformToFill,
                      TileMode = tile ? TileMode.Tile : TileMode.None,
                      ViewportUnits = tile ? BrushMappingMode.Absolute : BrushMappingMode.RelativeToBoundingBox,
                      Viewport = tile ? new Rect(0, 0, 512, 512) : new Rect(0, 0, 1, 1),
                      Opacity = opacity,
                      AlignmentX = AlignmentX.Center,
                      AlignmentY = AlignmentY.Center
                  };

                  var group = new DrawingBrush
                  {
                      Stretch = Stretch.Fill,
                      Drawing = new DrawingGroup
                      {
                          Children =
                          {
                              new GeometryDrawing(new SolidColorBrush(fallback), null, new RectangleGeometry(new Rect(0, 0, 1, 1))),
                              new GeometryDrawing(textureBrush, null, new RectangleGeometry(new Rect(0, 0, 1, 1)))
                          }
                      }
                  };
                  dictionary[key] = group;
              }
          '''

          new_texture = '''    private static void SetTextureBrush(ResourceDictionary resources, string key, string fileName, double opacity, bool tile, Color fallback)
              {
                  var dictionary = FindDictionary(resources, key);
                  try
                  {
                      var image = LoadThemeImage(fileName);
                      var textureBrush = new ImageBrush
                      {
                          ImageSource = image,
                          Stretch = tile ? Stretch.Fill : Stretch.UniformToFill,
                          TileMode = tile ? TileMode.Tile : TileMode.None,
                          ViewportUnits = tile ? BrushMappingMode.Absolute : BrushMappingMode.RelativeToBoundingBox,
                          Viewport = tile ? new Rect(0, 0, 512, 512) : new Rect(0, 0, 1, 1),
                          Opacity = opacity,
                          AlignmentX = AlignmentX.Center,
                          AlignmentY = AlignmentY.Center
                      };

                      var group = new DrawingBrush
                      {
                          Stretch = Stretch.Fill,
                          Drawing = new DrawingGroup
                          {
                              Children =
                              {
                                  new GeometryDrawing(new SolidColorBrush(fallback), null, new RectangleGeometry(new Rect(0, 0, 1, 1))),
                                  new GeometryDrawing(textureBrush, null, new RectangleGeometry(new Rect(0, 0, 1, 1)))
                              }
                          }
                      };
                      dictionary[key] = group;
                  }
                  catch (Exception ex)
                  {
                      System.Diagnostics.Debug.WriteLine($"Optional theme texture '{fileName}' was not loaded: {ex.Message}");
                      var fallbackBrush = new SolidColorBrush(fallback);
                      fallbackBrush.Freeze();
                      dictionary[key] = fallbackBrush;
                  }
              }
          '''

          if "CreateTransparentImage()" not in text:
              if old_image not in text:
                  raise SystemExit("SetImageResource block was not found; refusing an unsafe source rewrite.")
              text = text.replace(old_image, new_image, 1)

          if "Optional theme texture" not in text:
              if old_texture not in text:
                  raise SystemExit("SetTextureBrush block was not found; refusing an unsafe source rewrite.")
              text = text.replace(old_texture, new_texture, 1)

          path.write_text(text, encoding="utf-8")
          print("ThemeService optional asset fallbacks are present.")

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore TiHiY.StreamControlCenter.sln

      - name: Build
        shell: pwsh
        run: |
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore *> build.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $errors = Get-Content build.log | Where-Object { $_ -match ': error ' -or $_ -match 'error (CS|MC|XDG|MSB|NETSDK|BG)[0-9]+' }
            if (-not $errors) { $errors = Get-Content build.log | Select-Object -Last 160 }
            $errors | Set-Content -Path build-errors.txt -Encoding utf8
            Write-Host "==== BUILD ERRORS ===="
            Get-Content build-errors.txt | ForEach-Object { Write-Host $_ }
            Write-Host "==== END BUILD ERRORS ===="
            exit $exitCode
          }
          "Build completed successfully." | Set-Content -Path build-errors.txt -Encoding utf8
          Write-Host "Build completed successfully."

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            build.log
            build-errors.txt
          if-no-files-found: warn

      - name: Publish self-contained Windows build
        run: dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false --output publish

      - name: Upload program
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-StreamControl-Center-win-x64
          path: publish/**

      - name: Smoke test application startup
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path preview | Out-Null
          $diagnosticLog = Join-Path $PWD "preview/smoke-test.log"
          "Smoke test started at $(Get-Date -Format o)" | Set-Content $diagnosticLog -Encoding utf8

          $exe = (Resolve-Path "publish/TiHiY.StreamControlCenter.exe").Path
          $workingDirectory = Split-Path $exe
          $shot = Join-Path $PWD "preview/TiHiY-StreamControl-Center.png"
          $failure = $null
          $process = $null

          try {
            $startInfo = [Diagnostics.ProcessStartInfo]::new()
            $startInfo.FileName = $exe
            $startInfo.WorkingDirectory = $workingDirectory
            $startInfo.UseShellExecute = $false
            $startInfo.CreateNoWindow = $true
            $startInfo.RedirectStandardOutput = $true
            $startInfo.RedirectStandardError = $true
            $startInfo.ArgumentList.Add("--ci-screenshot=$shot")

            $process = [Diagnostics.Process]::new()
            $process.StartInfo = $startInfo
            if (-not $process.Start()) { throw "Process.Start returned false." }
            "Process started with PID $($process.Id)." | Add-Content $diagnosticLog

            $stdoutTask = $process.StandardOutput.ReadToEndAsync()
            $stderrTask = $process.StandardError.ReadToEndAsync()

            if (-not $process.WaitForExit(45000)) {
              $process.Kill($true)
              $process.WaitForExit()
              $failure = "Application startup smoke test timed out."
            } elseif ($process.ExitCode -ne 0) {
              $failure = "Application exited with code $($process.ExitCode) during startup smoke test."
            } elseif (-not (Test-Path $shot)) {
              $failure = "Application did not create the CI screenshot."
            }

            $stdout = $stdoutTask.GetAwaiter().GetResult()
            $stderr = $stderrTask.GetAwaiter().GetResult()
            if ($stdout) { "---- STDOUT ----`n$stdout" | Add-Content $diagnosticLog }
            if ($stderr) { "---- STDERR ----`n$stderr" | Add-Content $diagnosticLog }
            "Exit code: $($process.ExitCode)" | Add-Content $diagnosticLog
          }
          catch {
            $failure = "Smoke-test launcher failed: $($_.Exception.Message)"
            $_.Exception.ToString() | Add-Content $diagnosticLog
          }
          finally {
            if ($process) { $process.Dispose() }
            $appLogFolder = Join-Path $env:APPDATA "TiHiY/StreamControlCenter/Logs"
            if (Test-Path $appLogFolder) {
              Get-ChildItem $appLogFolder -File -ErrorAction SilentlyContinue | Copy-Item -Destination preview -Force
            }
          }

          if ($failure) {
            Write-Host "==== STARTUP DIAGNOSTICS ===="
            Get-ChildItem preview -File -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "---- $($_.Name) ----"
              if ($_.Extension -eq ".txt" -or $_.Extension -eq ".log") {
                Get-Content $_.FullName -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
              }
            }
            Write-Host "==== END STARTUP DIAGNOSTICS ===="
            throw $failure
          }
          Write-Host "Application startup smoke test completed successfully."

      - name: Upload application screenshot and startup logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-StreamControl-Center-Screenshot
          path: preview/**
          if-no-files-found: warn

      - name: Persist verified ThemeService fix
        if: success()
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Services/ThemeService.cs
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Handle missing optional theme images safely"
            $targetBranch = "${{ github.head_ref || github.ref_name }}"
            git push origin "HEAD:$targetBranch"
          } else {
            Write-Host "ThemeService fallback fix is already committed."
          }

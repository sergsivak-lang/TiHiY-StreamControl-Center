name: Windows Build

on:
  push:
    branches: [ main, "agent/**", "feature/**" ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore complete WPF source snapshot
        id: restore_wpf
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          try {
            if (-not (Test-Path "Services/AppServices.cs")) {
              Write-Host "Restoring complete WPF v1.0.5.2 source snapshot..."
              $url = "https://raw.githubusercontent.com/sergsivak-lang/TiHiY-StreamControl-Center/23801ef86f15bc0e4463133742fab0b985c4d85d/.github/bootstrap/wpfcore.part01.b64"
              Invoke-WebRequest -Uri $url -OutFile wpfcore.b64
              $raw = Get-Content wpfcore.b64 -Raw
              $base64 = [regex]::Replace($raw, '[^A-Za-z0-9+/=]', '')
              Write-Host "Downloaded raw characters: $($raw.Length)"
              Write-Host "Sanitized base64 characters: $($base64.Length)"
              if ([string]::IsNullOrWhiteSpace($base64)) { throw "WPF snapshot is empty after Base64 sanitization." }
              $bytes = [Convert]::FromBase64String($base64)
              [IO.File]::WriteAllBytes("wpfcore.zip", $bytes)
              Write-Host "Decoded ZIP bytes: $($bytes.Length)"
              if ($bytes.Length -lt 4 -or $bytes[0] -ne 0x50 -or $bytes[1] -ne 0x4B) { throw "Decoded WPF snapshot is not a valid ZIP archive." }
              Expand-Archive -Path wpfcore.zip -DestinationPath . -Force
            }
            if (-not (Test-Path "Services/AppServices.cs")) { throw "WPF source restoration failed: Services/AppServices.cs is missing." }
            if (-not (Test-Path "Windows/SettingsWindow.xaml")) { throw "WPF source restoration failed: Windows/SettingsWindow.xaml is missing." }
            Write-Host "WPF source snapshot restored successfully."
          }
          catch {
            $message = $_.Exception.Message.Replace('"','\"')
            Write-Host "::error::$message"
            gh pr comment 1 --body "CI restore error: $message"
            throw
          }

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore TiHiY.StreamControlCenter.sln

      - name: Build
        shell: pwsh
        run: |
          dotnet build TiHiY.StreamControlCenter.sln --configuration Release --no-restore *> build.log
          $exitCode = $LASTEXITCODE
          Write-Host "==== BUILD ERRORS / WARNINGS ===="
          Get-Content build.log | Select-String -Pattern ': error |: warning |MSB[0-9]+|XDG[0-9]+|MC[0-9]+' | ForEach-Object { Write-Host $_.Line }
          Write-Host "==== END BUILD DIAGNOSTICS ===="
          if ($exitCode -ne 0) { exit $exitCode }

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log

      - name: Publish portable Windows build
        run: dotnet publish TiHiY.StreamControlCenter.csproj --configuration Release --runtime win-x64 --self-contained false --output publish

      - name: Capture real application screenshot
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path preview | Out-Null
          $exe = Resolve-Path "publish/TiHiY.StreamControlCenter.exe"
          $shot = Join-Path $PWD "preview/TiHiY-Ukraine-Theme.png"
          $process = Start-Process -FilePath $exe -ArgumentList "--ci-screenshot=`"$shot`"" -PassThru
          if (-not $process.WaitForExit(45000)) {
            Stop-Process -Id $process.Id -Force
            throw "Screenshot process timed out."
          }
          if ($process.ExitCode -ne 0) { throw "Application exited with code $($process.ExitCode) while creating screenshot." }
          if (-not (Test-Path $shot)) { throw "Application did not create the screenshot." }

      - name: Upload real screenshot
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-Ukraine-Theme-Screenshot
          path: preview/TiHiY-Ukraine-Theme.png

      - name: Upload program
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-StreamControl-Center-win-x64
          path: publish/**

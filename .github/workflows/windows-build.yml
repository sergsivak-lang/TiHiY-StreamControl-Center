name: Windows Build
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore TiHiY.StreamControlCenter.csproj -r win-x64
      - run: dotnet build TiHiY.StreamControlCenter.csproj -c Release --no-restore
      - run: dotnet publish TiHiY.StreamControlCenter.csproj -c Release -r win-x64 --self-contained true --no-restore -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o Release
      - uses: actions/upload-artifact@v4
        with:
          name: TiHiY-StreamControl-Center-Test-v0.7.8-win-x64
          path: Release/**

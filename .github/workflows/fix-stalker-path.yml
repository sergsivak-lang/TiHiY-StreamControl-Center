name: Fix STALKER WPF Path

on:
  push:
    branches: [ feature/stalker-on-working-ukraine ]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: feature/stalker-on-working-ukraine
          fetch-depth: 0

      - name: Fix WPF Path type conflict
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('Services/StalkerDecorationRuntime.cs')
          text = p.read_text(encoding='utf-8')
          old = 'emblem.Children.Add(new Path\n        {'
          new = 'emblem.Children.Add(new System.Windows.Shapes.Path\n        {'
          if old not in text:
              raise RuntimeError('Target WPF Path construction was not found')
          p.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')
          PY
          rm -f .github/workflows/fix-stalker-path.yml

      - name: Commit correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix STALKER WPF Path type conflict"
          git push origin HEAD:feature/stalker-on-working-ukraine

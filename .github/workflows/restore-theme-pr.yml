name: Restore Theme Into PR

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  restore-theme:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Decode and validate CyberAmber
        shell: python {0}
        run: |
          import base64
          import glob
          import hashlib
          from pathlib import Path
          import xml.etree.ElementTree as ET

          parts = sorted(glob.glob("ThemeSupport/CyberAmber.xaml.b64.*"))
          if not parts:
              print("Theme payload is already absent; nothing to restore.")
              raise SystemExit(0)

          encoded = "".join(Path(part).read_text(encoding="utf-8").strip() for part in parts)
          data = base64.b64decode(encoded, validate=True)
          ET.fromstring(data)

          destination = Path("Themes/CyberAmber.xaml")
          destination.parent.mkdir(parents=True, exist_ok=True)
          destination.write_bytes(data)
          print(f"CyberAmber.xaml restored: {len(data)} bytes, SHA256={hashlib.sha256(data).hexdigest()}")

      - name: Commit restored theme to PR branch
        shell: bash
        run: |
          if ! compgen -G "ThemeSupport/CyberAmber.xaml.b64.*" > /dev/null; then
            echo "Theme payload already removed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Themes/CyberAmber.xaml
          git rm -r ThemeSupport
          git commit -m "Restore CyberAmber theme v1.0.5.2"
          git push origin "HEAD:${{ github.head_ref }}"

name: Apply Ukraine Exact Patch

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ukraine-reference-theme-v2
          fetch-depth: 0

      - name: Apply staged patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import pathlib
          import zipfile

          encoded = pathlib.Path('ThemePatch.b64').read_text(encoding='utf-8')
          archive = pathlib.Path('ThemePatch.zip')
          archive.write_bytes(base64.b64decode(encoded, validate=False))
          with zipfile.ZipFile(archive) as package:
              package.testzip()
              package.extractall('.')
          PY
          rm -f ThemePatch.b64 ThemePatch.zip
          rm -f .github/workflows/export-source.yml
          rm -f .github/workflows/apply-theme-patch.yml

      - name: Commit functional Ukraine Exact UI
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement functional Ukraine Exact main window"
          git push origin HEAD:feature/ukraine-reference-theme-v2

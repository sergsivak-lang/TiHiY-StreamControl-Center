name: Restore Ukraine Exact MainWindow Code

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  restore-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ukraine-reference-theme-v2
          fetch-depth: 0

      - name: Restore MainWindow code
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          import hashlib
          import pathlib

          parts = pathlib.Path('ThemePatchParts')
          a = (parts / 'MainWindow.xaml.cs.gz.b64.a').read_text(encoding='utf-8').strip()
          b = (parts / 'MainWindow.xaml.cs.gz.b64.b').read_text(encoding='utf-8').strip()
          print(f'part-a={len(a)} part-b={len(b)} total={len(a+b)}')
          payload = base64.b64decode(a + b, validate=True)
          code = gzip.decompress(payload)
          print(f'compressed={len(payload)} output={len(code)} sha256={hashlib.sha256(code).hexdigest()}')
          if len(code) < 50000:
              raise RuntimeError('Restored MainWindow code is unexpectedly short')
          pathlib.Path('MainWindow.xaml.cs').write_bytes(code)
          PY

      - name: Remove code staging files
        shell: bash
        run: |
          rm -f ThemePatchParts/MainWindow.xaml.cs.gz.b64
          rm -f ThemePatchParts/MainWindow.xaml.cs.gz.b64.a
          rm -f ThemePatchParts/MainWindow.xaml.cs.gz.b64.b
          rm -f .github/workflows/apply-theme-patch.yml

      - name: Commit restored functional code
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore functional Ukraine Exact MainWindow code"
          git push origin HEAD:feature/ukraine-reference-theme-v2

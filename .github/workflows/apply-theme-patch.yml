name: Apply Ukraine Exact Patch

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ukraine-reference-theme-v2
          fetch-depth: 0

      - name: Diagnose staged containers
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import hashlib
          import io
          import pathlib
          import tarfile
          import traceback

          report = []
          text_parts = [
              'ThemePatchParts/MainWindow.xaml.gz.b64',
              'ThemePatchParts/MainWindow.xaml.cs.gz.b64',
              'ThemePatchParts/ThemeService.cs.gz.b64',
              'ThemePatchParts/UkraineReference.xaml.gz.b64',
          ]
          for path in text_parts:
              try:
                  text = pathlib.Path(path).read_text(encoding='utf-8').strip()
                  decoded = base64.b64decode(text, validate=True)
                  data = gzip.decompress(decoded)
                  report.append(f'OK {path}: chars={len(text)} sha256={hashlib.sha256(text.encode()).hexdigest()} decoded={len(decoded)} output={len(data)}')
              except Exception:
                  report.append(f'FAIL {path}:\n{traceback.format_exc()}')

          try:
              first = pathlib.Path('ThemePatchParts/Assets-00.tar.gz.b64').read_text(encoding='utf-8').strip()
              second = pathlib.Path('ThemePatchParts/Assets-01.tar.gz.b64').read_text(encoding='utf-8').strip()
              report.append(f'INFO assets-00 chars={len(first)} sha256={hashlib.sha256(first.encode()).hexdigest()}')
              report.append(f'INFO assets-01 chars={len(second)} sha256={hashlib.sha256(second.encode()).hexdigest()}')
              decoded = base64.b64decode(first + second, validate=True)
              with tarfile.open(fileobj=io.BytesIO(decoded), mode='r:gz') as archive:
                  members = archive.getmembers()
                  archive.extractall('/tmp/ukraine-assets-check')
              report.append(f'OK assets archive: decoded={len(decoded)} members={len(members)}')
          except Exception:
              report.append(f'FAIL assets archive:\n{traceback.format_exc()}')

          pathlib.Path('reconstruct-diagnostic.txt').write_text('\n\n'.join(report), encoding='utf-8')
          print('\n\n'.join(report))
          PY

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: Ukraine-Exact-Reconstruct-Diagnostic
          path: reconstruct-diagnostic.txt
          if-no-files-found: error

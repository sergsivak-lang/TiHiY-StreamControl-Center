name: Apply Ukraine Exact Patch

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ukraine-reference-theme-v2
          fetch-depth: 0

      - name: Reconstruct exact UI files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          import io
          import pathlib
          import tarfile

          def read_payload(path):
              text = pathlib.Path(path).read_text(encoding='utf-8').strip()
              return base64.b64decode(text, validate=True)

          files = {
              'ThemePatchParts/MainWindow.xaml.gz.b64': 'MainWindow.xaml',
              'ThemePatchParts/MainWindow.xaml.cs.gz.b64': 'MainWindow.xaml.cs',
              'ThemePatchParts/ThemeService.cs.gz.b64': 'Services/ThemeService.cs',
              'ThemePatchParts/UkraineReference.xaml.gz.b64': 'Themes/UkraineReference.xaml',
          }
          for source, target in files.items():
              data = gzip.decompress(read_payload(source))
              destination = pathlib.Path(target)
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(data)
              print(f'wrote {target}: {len(data)} bytes')

          assets_text = (
              pathlib.Path('ThemePatchParts/Assets-00.tar.gz.b64').read_text(encoding='utf-8').strip()
              + pathlib.Path('ThemePatchParts/Assets-01.tar.gz.b64').read_text(encoding='utf-8').strip()
          )
          assets_payload = base64.b64decode(assets_text, validate=True)
          with tarfile.open(fileobj=io.BytesIO(assets_payload), mode='r:gz') as archive:
              members = archive.getmembers()
              for member in members:
                  resolved = pathlib.Path(member.name)
                  if resolved.is_absolute() or '..' in resolved.parts:
                      raise RuntimeError(f'unsafe tar path: {member.name}')
              archive.extractall('.')
              print(f'extracted assets: {len(members)} members')
          PY

      - name: Remove staging files
        shell: bash
        run: |
          rm -rf ThemePatchParts
          rm -f ThemePatch.b64 ThemePatch.zip patch-ok.txt patch-diagnostic.txt
          rm -f .github/workflows/export-source.yml
          rm -f .github/workflows/apply-theme-patch.yml

      - name: Commit functional Ukraine Exact UI
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement functional Ukraine Exact main window"
          git push origin HEAD:feature/ukraine-reference-theme-v2

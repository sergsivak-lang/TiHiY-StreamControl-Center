name: Apply Ukraine Exact Patch

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/ukraine-reference-theme-v2
          fetch-depth: 0

      - name: Reconstruct exact functional Ukraine UI
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          import pathlib

          def read_text(path):
              return pathlib.Path(path).read_text(encoding='utf-8').strip()

          files = {
              'ThemePatchParts/MainWindow.xaml.gz.b64': 'MainWindow.xaml',
              'ThemePatchParts/ThemeService.cs.gz.b64': 'Services/ThemeService.cs',
              'ThemePatchParts/UkraineReference.xaml.gz.b64': 'Themes/UkraineReference.xaml',
          }
          for source, target in files.items():
              payload = base64.b64decode(read_text(source), validate=True)
              data = gzip.decompress(payload)
              destination = pathlib.Path(target)
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(data)
              print(f'wrote {target}: {len(data)} bytes')

          print('preserved existing MainWindow.xaml.cs and existing vector ornaments/assets')
          PY

      - name: Remove staging and temporary workflows
        shell: bash
        run: |
          rm -rf ThemePatchParts
          rm -f ThemePatch.b64 ThemePatch.zip patch-ok.txt patch-diagnostic.txt reconstruct-diagnostic.txt
          rm -f .github/workflows/export-source.yml
          rm -f .github/workflows/apply-theme-patch.yml

      - name: Commit exact functional Ukraine UI
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement exact functional Ukraine reference UI"
          git push origin HEAD:feature/ukraine-reference-theme-v2

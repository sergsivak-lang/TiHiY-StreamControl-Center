name: Materialize Ukraine Exact MainWindow Code

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  materialize-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact feature head
        uses: actions/checkout@v4
        with:
          ref: feature/ukraine-reference-theme-v2
          fetch-depth: 0

      - name: Restore real MainWindow code
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          import pathlib

          root = pathlib.Path('ThemePatchParts')
          code_b64 = (
              (root / 'MainWindow.xaml.cs.gz.b64.a').read_text(encoding='utf-8').strip()
              + (root / 'MainWindow.xaml.cs.gz.b64.b').read_text(encoding='utf-8').strip()
          )
          if len(code_b64) != 17724:
              raise RuntimeError(f'Unexpected code Base64 length: {len(code_b64)}')
          code = gzip.decompress(base64.b64decode(code_b64, validate=True))
          if len(code) != 61147:
              raise RuntimeError(f'Unexpected MainWindow.xaml.cs size: {len(code)}')
          pathlib.Path('MainWindow.xaml.cs').write_bytes(code)
          print(f'MainWindow.xaml.cs restored: {len(code)} bytes')
          PY

      - name: Remove code staging and temporary workflow
        shell: bash
        run: |
          rm -f ThemePatchParts/MainWindow.xaml.cs.gz.b64
          rm -f ThemePatchParts/MainWindow.xaml.cs.gz.b64.a
          rm -f ThemePatchParts/MainWindow.xaml.cs.gz.b64.b
          rm -f .github/workflows/apply-theme-patch.yml

      - name: Commit functional MainWindow code
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize functional Ukraine Exact MainWindow code"
          git push origin HEAD:feature/ukraine-reference-theme-v2
